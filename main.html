<!DOCTYPE html>
<html>
<head>
  <title>Click Target Game</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background-color: rgb(209, 143, 62);
    }

    #gameArea {
      width: 400px;
      height: 400px;
      border: 2px solid black;
      margin: 20px auto;
      position: relative;
      background: #eee59f;
    }

    #target {
      width: 50px;
      height: 50px;
      background: red;
      border-radius: 50%;
      position: absolute;
      display: none;
      cursor: pointer;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h2>Click the Target Game 🎯</h2>

<p>Score: <span id="score">0</span></p>

<div id="gameArea">
  <div id="target"></div>
</div>

<button onclick="startGame()">Start Game</button>

<script>
  let score = 0;
  let gameInterval;

  const target = document.getElementById("target");
  const gameArea = document.getElementById("gameArea");

  function startGame() {
    score = 0;
    document.getElementById("score").innerText = score;

    target.style.display = "block";

    gameInterval = setInterval(moveTarget, 1000);

    setTimeout(endGame, 10000); // game lasts 10 sec
  }

  function moveTarget() {
    let x = Math.random() * (gameArea.clientWidth - 50);
    let y = Math.random() * (gameArea.clientHeight - 50);

    target.style.left = x + "px";
    target.style.top = y + "px";
  }

  target.onclick = function() {
    score++;
    document.getElementById("score").innerText = score;
  };

  function endGame() {
    clearInterval(gameInterval);
    target.style.display = "none";
    alert("Game Over! Your score: " + score);
  }
</script>

</body>
</html>
